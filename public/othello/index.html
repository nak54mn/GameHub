<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>黑白棋 Othello</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <button id="hub-btn" onclick="window.location.href='/'">🏠 Hub</button>

    <!-- Lobby -->
    <div id="lobby" class="container glass-panel active">
        <h1>黑白棋<br>Othello</h1>
        <p class="subtitle">即時連線對戰 · Multiplayer</p>
        
        <div class="input-group">
            <input type="text" id="playerName" placeholder="輸入暱稱 / Enter Name" autocomplete="off" />
        </div>
        
        <div class="action-buttons" style="flex-wrap: wrap;">
            <button id="btnCreateRoom" class="primary-btn">🎮 創建房間</button>
            <button id="btnPlayAi" class="primary-btn" style="background: linear-gradient(135deg, #10b981, #3b82f6);">🤖 單機對電腦</button>
            <div class="divider"><span>或加入房間</span></div>
            <div class="join-group">
                <input type="text" id="roomCodeInput" placeholder="房間碼 CODE" maxlength="4" autocomplete="off" />
                <button id="btnJoinRoom" class="secondary-btn" style="width: auto; padding: 13px 20px;">加入</button>
            </div>
        </div>
        <div id="lobbyMessage" class="message error"></div>
    </div>

    <!-- Waiting Room -->
    <div id="waitingRoom" class="container glass-panel">
        <h2 style="font-size: 1.3rem; font-weight: 700;">等待對手中...</h2>
        <div class="room-code-display">
            房間代碼
            <span id="displayRoomCode" class="highlight"></span>
        </div>
        <div class="spinner"></div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">將上方代碼分享給您的對手</p>
    </div>

    <!-- Game -->
    <div id="gameContainer" class="game-wrapper glass-panel">
        <div class="game-header">
            <div class="player-info" id="player1Info">
                <div class="disc black-disc"></div>
                <div class="name" id="p1Name">—</div>
                <div class="score" id="blackScore">2</div>
            </div>
            
            <div class="turn-indicator" id="turnIndicator">您的回合</div>

            <div class="player-info" id="player2Info">
                <div class="score" id="whiteScore">2</div>
                <div class="name" id="p2Name">—</div>
                <div class="disc white-disc"></div>
            </div>
        </div>

        <div class="board-container">
            <div id="board" class="othello-board"></div>
        </div>

        <div id="gameMessage" class="game-message"></div>
        
        <div id="gameOverModal" class="modal">
            <div class="modal-content">
                <h2 id="winnerText">遊戲結束！</h2>
                <div class="final-score">
                    ⚫ <span id="finalBlack">32</span> &nbsp;vs&nbsp; <span id="finalWhite">32</span> ⚪
                </div>
                <button id="btnPlayAgain" class="primary-btn">回到大廳</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
